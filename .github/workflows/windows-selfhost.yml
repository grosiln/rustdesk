name: Windows Self-Host Client

# Builds only Windows x64 Flutter client with self-host server settings
# from repository secrets: RENDEZVOUS_SERVER, RS_PUB_KEY, API_SERVER

on:
  workflow_dispatch:

jobs:
  run-ci:
    uses: ./.github/workflows/flutter-build.yml
    secrets: inherit
    with:
      upload-artifact: true
      upload-tag: selfhost-windows
      only-windows: true
