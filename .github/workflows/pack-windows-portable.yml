name: Pack Windows Portable

# Builds a single self-extracting portable EXE from an existing
# rustdesk-unsigned-windows-x86_64 artifact (no full rebuild).

on:
  workflow_dispatch:
    inputs:
      run-id:
        description: "GitHub Actions run ID that contains rustdesk-unsigned-windows-x86_64"
        required: true
        type: string
        default: "29498671152"

env:
  VERSION: "1.4.9"

jobs:
  pack-portable:
    runs-on: windows-2022
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout source code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - name: Download unsigned Windows build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: rustdesk-unsigned-windows-x86_64
          path: ./rustdesk
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.run-id }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.75"
          targets: x86_64-pc-windows-msvc

      - name: Build portable self-extracted EXE
        shell: bash
        run: |
          test -f ./rustdesk/rustdesk.exe
          sed -i '/dpiAware/d' res/manifest.xml || true
          pushd ./libs/portable
          pip3 install -r requirements.txt
          python3 ./generate.py -f ../../rustdesk/ -o . -e ../../rustdesk/rustdesk.exe
          popd
          mkdir -p ./SignOutput
          # Workspace cargo target is at repo root (same as flutter-build.yml).
          mv ./target/release/rustdesk-portable-packer.exe \
            ./SignOutput/rustdesk-${{ env.VERSION }}-x86_64-portable.exe
          ls -lh ./SignOutput/

      - name: Upload portable EXE
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rustdesk-portable-windows-x86_64
          path: ./SignOutput/rustdesk-*-portable.exe
          if-no-files-found: error
